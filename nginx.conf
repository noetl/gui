server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /env-config.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    expires -1;
    try_files $uri =404;
  }

  include /etc/nginx/noetl-locations/*.conf;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
