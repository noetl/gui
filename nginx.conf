map $uri $loggable_request {
  # High-frequency or static paths — silenced in access log to keep pod
  # stdout focused on app traffic. Errors still flow through error_log.
  default                 1;
  ~*\.(?:js|css|map|svg|png|jpe?g|gif|ico|woff2?|ttf|otf|eot)$  0;
}

server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Default access log honours the $loggable_request map above. error_log
  # keeps its default level so real nginx-level problems still surface.
  access_log /var/log/nginx/access.log combined if=$loggable_request;

  location = /env-config.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    expires -1;
    # env-config.js is fetched on every page load (no-cache) for the SPA
    # bootstrap and clutters the log without operational value. Mute it
    # entirely; non-200 responses still appear in error_log.
    access_log off;
    try_files $uri =404;
  }

  location = /favicon.ico {
    access_log off;
    log_not_found off;
    try_files $uri =204;
  }

  location = /robots.txt {
    access_log off;
    log_not_found off;
    try_files $uri =204;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
