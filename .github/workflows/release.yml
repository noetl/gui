name: release-gui

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version without v prefix (e.g. 1.4.1). Leave empty for package.json version."
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  verify-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        shell: bash
        run: |
          set -euo pipefail
          INPUT_VERSION="$(jq -r '.inputs.version // empty' "${GITHUB_EVENT_PATH}" 2>/dev/null || true)"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            TAG_VERSION="${TAG#v}"
            [[ "${TAG_VERSION}" == "${PACKAGE_VERSION}" ]] || (echo "Tag/package version mismatch" && exit 1)
          elif [[ -n "${INPUT_VERSION}" ]]; then
            TAG="v${INPUT_VERSION}"
            [[ "${INPUT_VERSION}" == "${PACKAGE_VERSION}" ]] || (echo "Input/package version mismatch" && exit 1)
          else
            TAG="v${PACKAGE_VERSION}"
          fi

          echo "version=${PACKAGE_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

  publish-image:
    runs-on: ubuntu-latest
    needs: verify-version
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/noetl/gui:${{ needs.verify-version.outputs.version }}
            ghcr.io/noetl/gui:latest

  github-release:
    runs-on: ubuntu-latest
    needs: [verify-version, publish-image]
    if: ${{ always() && needs.verify-version.result == 'success' && needs.publish-image.result == 'success' }}
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-version.outputs.tag }}
          generate_release_notes: true
          body: |
            - image: `ghcr.io/noetl/gui:${{ needs.verify-version.outputs.version }}`
