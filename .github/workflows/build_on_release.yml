name: "Build image on Release"

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to build, for example v1.2.3"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build_push_image:
    name: build and push GUI image
    # PR #16's friendly run dialog pushed the bundle size up enough that
    # npm ci + Vite/TypeScript compile under QEMU-emulated arm64
    # consistently exceeds 20 minutes (v1.3.0/v1.3.1 both cancelled at
    # the cap). Cross-compiling on a native amd64 runner is the long-
    # term answer; raising the cap to 60 minutes is the immediate
    # unblock so the buildkit cache below can prime itself.
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: noetl/gui
      IMAGE_TAG: ${{ github.event.release.tag_name || inputs.version }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.version }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=semver,pattern={{version}},value=${{ env.IMAGE_TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.IMAGE_TAG }}
            type=semver,pattern={{major}},value=${{ env.IMAGE_TAG }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ env.IMAGE_TAG }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          # GitHub Actions cache keeps `npm ci` + the Vite build dist
          # warm across runs. The first build (cold cache) still pays
          # the full QEMU cost, but every subsequent release tag
          # finishes in a few minutes instead of timing out at 20.
          # `mode=max` writes layer cache including intermediate
          # stages, not just the final image.
          cache-from: type=gha,scope=gui-image
          cache-to: type=gha,mode=max,scope=gui-image
